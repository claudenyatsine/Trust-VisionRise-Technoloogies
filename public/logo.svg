<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer orbital arcs -->
  <path d="M50 10 A42 42 0 0 1 88 62" stroke="url(#grad1)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M12 62 A42 42 0 0 1 50 10" stroke="url(#grad1)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Orbital dots -->
  <circle cx="50" cy="9" r="5.5" fill="url(#grad2)"/>
  <circle cx="88" cy="63" r="5.5" fill="url(#grad2)"/>
  <circle cx="12" cy="63" r="5.5" fill="url(#grad2)"/>
  <!-- Camera body -->
  <rect x="22" y="40" width="38" height="22" rx="5" fill="url(#grad2)"/>
  <!-- Camera lens barrel -->
  <ellipse cx="60" cy="51" rx="9" ry="8" fill="url(#grad1)"/>
  <ellipse cx="60" cy="51" rx="5" ry="4.5" fill="url(#grad2)"/>
  <!-- Camera mount/base -->
  <path d="M22 46 L14 40 L14 62 L22 56" fill="url(#grad1)"/>
  <!-- Lens ring highlight -->
  <circle cx="60" cy="51" r="6" stroke="#4A80C4" stroke-width="1" fill="none" opacity="0.5"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A6BC4"/>
      <stop offset="100%" stop-color="#01357D"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A4FA0"/>
      <stop offset="100%" stop-color="#01257A"/>
    </linearGradient>
  </defs>
</svg>